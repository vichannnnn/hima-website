name: CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vichannnnn/hima-website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Cache Docker layers
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CICD_TOKEN }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hima-website:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Print github.ref
        run: echo "github.ref=${{ github.ref }}"

      - name: executing remote ssh commands using private key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.MASTER_REMOTE_HOST }}
          username: ${{ secrets.MASTER_REMOTE_USER }}
          key: ${{ secrets.MASTER_SSH_PRIVATE_KEY }}
          script: |
            cd hima-website
            docker compose pull
            docker compose up -d
            rm -r ../api-gateway/hima-website
            docker cp hima-blog-frontend:/usr/share/caddy/hima-website ../api-gateway/hima-website/
            docker compose stop hima-website
            docker restart api-gateway
